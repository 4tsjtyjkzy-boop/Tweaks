name: Build Meteorite Tweak

on:
  push:
    branches: [ master, main ]
    paths:
      - 'meteorite/**'
      - '.github/workflows/build-meteorite.yml'
  pull_request:
    branches: [ master, main ]
    paths:
      - 'meteorite/**'
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest
    timeout-minutes: 30
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Install dependencies
        run: |
          brew install ldid
          brew install xz
          brew install dpkg
      
      - name: Clone Theos
        run: |
          git clone --recursive https://github.com/theos/theos.git $HOME/theos
          cd $HOME/theos
          git fetch --all --tags
          git checkout latest
      
      - name: Set Theos environment
        run: |
          echo "THEOS=$HOME/theos" >> $GITHUB_ENV
          echo "PATH=$HOME/theos/bin:$PATH" >> $GITHUB_ENV
          echo "SDKVERSION=12.2" >> $GITHUB_ENV
      
      - name: Setup iOS 12 SDK
        run: |
          mkdir -p $THEOS/sdks
          cd $THEOS/sdks
          
          # Try downloading iOS 12 SDK from multiple sources
          echo "Attempting to download iOS 12 SDK..."
          
          # Try source 1 with wget
          if wget -q --timeout=10 https://github.com/theos/sdks/releases/download/sdks/iPhoneOS12.2.sdk.tar.gz -O ios12.tar.gz; then
            tar -xzf ios12.tar.gz && rm ios12.tar.gz && echo "✓ iOS 12.2 SDK downloaded successfully" && exit 0
          fi
          
          # Try source 2 - Use curl as fallback
          if curl -L --max-time 10 https://github.com/theos/sdks/releases/download/sdks/iPhoneOS12.2.sdk.tar.gz -o ios12.tar.gz; then
            tar -xzf ios12.tar.gz && rm ios12.tar.gz && echo "✓ iOS 12.2 SDK downloaded successfully" && exit 0
          fi
          
          echo "⚠ SDK download unavailable, will attempt to use system SDK"
      
      - name: Build Meteorite tweak
        run: |
          cd meteorite
          export THEOS=$HOME/theos
          export SDKVERSION=12.2
          export DEPLOYMENT_TARGET=10.0
          
          echo "=== Build Environment ==="
          echo "THEOS: $THEOS"
          echo "SDKVERSION: $SDKVERSION"
          echo "DEPLOYMENT_TARGET: $DEPLOYMENT_TARGET"
          
          make clean
          make FINALPACKAGE=1
      
      - name: Check build output
        if: always()
        run: |
          cd meteorite
          echo "=== Build artifacts ==="
          find .theos -type f -name "*.deb" 2>/dev/null || echo "Checking build structure..."
          find .theos -type f 2>/dev/null | head -20
      
      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: meteorite-build-${{ github.run_number }}
          path: meteorite/.theos/
          retention-days: 30
      
      - name: Comment on PR with build status
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const buildSuccess = '${{ job.status }}' === 'success';
            const message = buildSuccess 
              ? '✅ Build successful! Meteorite tweak compiled.' 
              : '❌ Build failed. Check Actions logs.';
            
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: message
            })
