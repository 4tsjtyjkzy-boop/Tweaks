name: Build Meteorite Tweak

on:
  push:
    branches: [ master, main ]
    paths:
      - 'meteorite/**'
      - '.github/workflows/build-meteorite.yml'
  pull_request:
    branches: [ master, main ]
    paths:
      - 'meteorite/**'
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest
    timeout-minutes: 45
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Install dependencies
        run: |
          brew install ldid
          brew install xz
      
      - name: Clone Theos
        run: |
          git clone --recursive https://github.com/theos/theos.git $HOME/theos
      
      - name: Set Theos environment
        run: |
          echo "THEOS=$HOME/theos" >> $GITHUB_ENV
          echo "PATH=$HOME/theos/bin:$PATH" >> $GITHUB_ENV
      
      - name: Setup SDKs directory
        run: |
          mkdir -p $THEOS/sdks
          ls -la $THEOS/sdks || echo "SDKs directory created"
      
      - name: Build Meteorite tweak
        run: |
          cd meteorite
          export THEOS=$HOME/theos
          
          echo "=== Build Environment ==="
          echo "THEOS: $THEOS"
          echo "PATH: $PATH"
          echo "ARCHS: arm64 (iOS 12 compatible)"
          
          echo "=== Theos Status ==="
          $THEOS/bin/theos --version || echo "Theos version check skipped"
          
          echo "=== Starting Build ==="
          make clean
          make FINALPACKAGE=1 || {
            echo "Build failed, checking details..."
            exit 1
          }
      
      - name: Check build output
        if: always()
        run: |
          cd meteorite
          echo "=== Build Artifacts ==="
          find .theos -type f 2>/dev/null | head -30
          
          if find .theos -type f -name "*.deb" 2>/dev/null | grep -q .; then
            echo ""
            echo "✓ Build successful! .deb files:"
            find .theos -type f -name "*.deb"
          else
            echo ""
            echo "Note: Checking for build products..."
            ls -la .theos/obj/ 2>/dev/null || echo "No obj directory"
          fi
      
      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: meteorite-build-${{ github.run_number }}
          path: meteorite/.theos/
          retention-days: 30
      
      - name: Comment on PR with build status
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const buildSuccess = '${{ job.status }}' === 'success';
            const message = buildSuccess 
              ? '✅ Build successful! Meteorite tweak compiled for iOS 12.' 
              : '❌ Build failed. Check Actions logs for details.';
            
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: message
            })
